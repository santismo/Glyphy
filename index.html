<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#101217"><title>Glyphy</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head><body><div id="app"><header class="topbar"><div class="brand">Glyphy</div><button id="undoBtn">↶</button><button id="redoBtn">↷</button><button id="exportBtn">Export</button></header><main id="workspace"><div id="canvasWrap"><div id="canvasStage"><canvas id="gridCanvas"></canvas><div id="layerStack"></div><canvas id="previewCanvas"></canvas></div></div><div class="hud"><label>Size <input id="sizeSlider" type="range" min="8" max="360" value="92"></label><label>Space <input id="spacingSlider" type="range" min="1" max="240" value="50"></label></div></main><nav class="dock"><button id="brushPanelBtn">Brush</button><button id="searchPanelBtn">Search</button><button id="layersPanelBtn">Layers</button></nav><section id="brushPanel" class="sheet"><div class="grab"></div><h2>Brush</h2><input id="imageInput" type="file" accept="image/*"><canvas id="sourceCanvas"></canvas><div class="actions"><button id="autoTrimBtn">Trim</button><button id="bgRemoveBtn">Cut bg</button><button id="makeBrushBtn">Use brush</button></div><label>Opacity <input id="opacitySlider" type="range" min="0.05" max="1" value="1" step="0.05"></label><label>Rotation <input id="rotationSlider" type="range" min="0" max="360" value="0"></label><label>Rotation jitter <input id="rotJitterSlider" type="range" min="0" max="180" value="20"></label><label>Scale jitter <input id="scaleJitterSlider" type="range" min="0" max="1" value="0.15" step="0.01"></label><label>Spacing jitter <input id="spaceJitterSlider" type="range" min="0" max="1" value="0.1" step="0.01"></label><label>Feather <input id="featherSlider" type="range" min="0" max="30" value="0"></label><label class="check"><input id="followStroke" type="checkbox" checked> rotate with stroke</label><label class="check"><input id="randomFlip" type="checkbox"> random flip</label><div class="actions"><button id="saveBrushBtn">Save</button><button id="clearBrushesBtn">Clear saved</button></div><div id="brushLibrary"></div></section><section id="searchPanel" class="sheet"><div class="grab"></div><h2>Image search</h2><div class="searchrow"><input id="searchInput" placeholder="flowers, clouds, statues..."><button id="searchBtn">Search</button></div><p class="hint">Uses public Wikimedia Commons images. Tap a result, then use it as a brush.</p><div id="searchResults"></div></section><section id="layersPanel" class="sheet"><div class="grab"></div><h2>Layers</h2><div class="actions"><button id="addLayerBtn">Add layer</button><button id="clearLayerBtn">Clear layer</button></div><div id="layersList"></div></section></div><script src="app.js"></script></body></html>
