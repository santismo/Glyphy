<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Glyphy</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head><body><div id="app"><header class="topbar"><div class="brand">Glyphy</div><button id="undoBtn">Undo</button><button id="redoBtn">Redo</button><button id="exportBtn">Export</button><button id="brushPanelBtn">Brushes</button><button id="layersPanelBtn">Layers</button></header><main id="workspace"><div id="canvasWrap"><div id="canvasStage"><canvas id="gridCanvas"></canvas><div id="layerStack"></div><canvas id="previewCanvas"></canvas></div></div><div class="hud"><label>Size <input id="sizeSlider" type="range" min="8" max="360" value="92"></label><label>Space <input id="spacingSlider" type="range" min="1" max="240" value="50"></label></div></main><aside id="brushPanel" class="panel open"><h2>Brush</h2><input id="imageInput" type="file" accept="image/*"><canvas id="sourceCanvas"></canvas><button id="autoTrimBtn">Auto trim</button><button id="bgRemoveBtn">Remove background</button><button id="makeBrushBtn">Use image as brush</button><label>Opacity <input id="opacitySlider" type="range" min="0.05" max="1" value="1" step="0.05"></label><label>Rotation <input id="rotationSlider" type="range" min="0" max="360" value="0"></label><label>Rotation jitter <input id="rotJitterSlider" type="range" min="0" max="180" value="20"></label><label>Scale jitter <input id="scaleJitterSlider" type="range" min="0" max="1" value="0.15" step="0.01"></label><label>Spacing jitter <input id="spaceJitterSlider" type="range" min="0" max="1" value="0.1" step="0.01"></label><label>Feather <input id="featherSlider" type="range" min="0" max="30" value="0"></label><label><input id="followStroke" type="checkbox" checked> rotate with stroke</label><label><input id="randomFlip" type="checkbox"> random flip</label><button id="saveBrushBtn">Save brush</button><button id="clearBrushesBtn">Clear saved</button><div id="brushLibrary"></div></aside><aside id="layersPanel" class="panel right"><h2>Layers</h2><button id="addLayerBtn">Add layer</button><button id="clearLayerBtn">Clear layer</button><div id="layersList"></div></aside></div><script src="app.js"></script></body></html>
