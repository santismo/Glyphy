<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,viewport-fit=cover,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0b0d12"><title>Glyphy</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head><body><div id="app"><header class="topbar"><div class="brand">Glyphy</div><button id="undoBtn" class="icon">↶</button><button id="redoBtn" class="icon">↷</button><button id="exportBtn" class="pill">Export</button></header><main id="workspace"><div class="zoomhud sheet"><label>Zoom <input id="zoomSlider" type="range" min="0.15" max="3.5" step="0.01" value="0.55"></label></div><div id="canvasWrap"><div id="canvasStage"><canvas id="gridCanvas"></canvas><div id="layerStack"></div><canvas id="previewCanvas"></canvas></div></div><div class="hud sheet"><label>Size <input id="sizeSlider" type="range" min="4" max="360" value="92"></label><label>Space <input id="spacingSlider" type="range" min="0" max="220" value="8"></label></div></main><nav class="dock"><button id="brushPanelBtn">Brush</button><button id="searchPanelBtn">Search</button><button id="layersPanelBtn">Layers</button></nav><section id="brushPanel" class="sheet"><div class="grab"></div><h2>Brush</h2><input id="imageInput" type="file" accept="image/*"><div id="sourceBox"><canvas id="sourceCanvas"></canvas><canvas id="cropOverlay"></canvas></div><p class="hint">Crop repeatedly: choose a mode, select an area, then keep cropping until the brush looks right. Paint mask lets you paint the part to keep.</p><div class="actions"><button id="undoCropBtn">Undo crop</button><button id="autoTrimBtn">Trim</button><button id="bgRemoveBtn">Cut bg</button></div><label>Crop mode <select id="cropMode"><option value="none">off</option><option value="paint">paint keep area</option><option value="object">tap object</option><option value="rect">rectangle</option><option value="ellipse">ellipse</option><option value="lasso">custom lasso</option></select></label><div class="actions"><button id="resetCropBtn">Reset</button><button id="makeBrushBtn">Use brush</button><button id="saveBrushBtn">Save</button></div><label>Spacing mode <select id="spacingMode"><option value="px">fixed pixels</option><option value="edge">edge-to-edge</option></select></label><details><summary>Advanced brush settings</summary><label>Opacity <input id="opacitySlider" type="range" min="0.05" max="1" value="1" step="0.05"></label><label>Rotation <input id="rotationSlider" type="range" min="0" max="360" value="0"></label><label>Rotation jitter <input id="rotJitterSlider" type="range" min="0" max="180" value="20"></label><label>Scale jitter <input id="scaleJitterSlider" type="range" min="0" max="1" value="0.15" step="0.01"></label><label>Spacing jitter <input id="spaceJitterSlider" type="range" min="0" max="1" value="0.05" step="0.01"></label><label>Feather <input id="featherSlider" type="range" min="0" max="30" value="0"></label><label class="check"><input id="followStroke" type="checkbox" checked> rotate with stroke</label><label class="check"><input id="randomFlip" type="checkbox"> random flip</label></details><div class="actions two"><button id="clearBrushesBtn">Clear saved</button></div><div id="brushLibrary"></div></section><section id="searchPanel" class="sheet"><div class="grab"></div><h2>Image search</h2><div class="searchrow"><input id="searchInput" placeholder="flowers, clouds, statues..."><button id="searchBtn">Search</button></div><select id="searchSource"><option value="all">All open sources</option><option value="commons">Wikimedia Commons</option><option value="openverse">Openverse</option><option value="met">The Met</option></select><p class="hint">Tap a result, crop it, then use it as a brush.</p><div id="searchResults"></div></section><section id="layersPanel" class="sheet"><div class="grab"></div><h2>Layers</h2><div class="actions two"><button id="addLayerBtn">Add layer</button><button id="clearLayerBtn">Clear layer</button></div><div id="layersList"></div></section></div><script src="app.js"></script><script src="sources.js"></script></body></html>
